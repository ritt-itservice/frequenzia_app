name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # Uses the committed Gradle Wrapper (gradlew) to download Gradle
      # directly from services.gradle.org, still with build-cache support.
      # A previous attempt pinning gradle-version explicitly (and even
      # "current") made setup-gradle fail immediately on every run, since
      # its own version-provisioning mechanism couldn't fetch it on the
      # runner — the wrapper's plain zip download is a more reliable path.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # gradle.properties pins org.gradle.java.home to a local Windows JDK
      # path for developer machines; override it here with the JDK 21 that
      # actions/setup-java just installed on the runner.
      - name: Lint
        run: ./gradlew -Dorg.gradle.java.home="$JAVA_HOME" lint

      - name: Unit tests
        run: ./gradlew -Dorg.gradle.java.home="$JAVA_HOME" testDebugUnitTest

      - name: Release build (validates R8/ProGuard rules)
        run: ./gradlew -Dorg.gradle.java.home="$JAVA_HOME" assembleRelease

      # No signing secrets are configured in this repo (the release
      # keystore stays local, see keystore.properties), so this APK is
      # unsigned and for build verification / manual re-signing only.
      - name: Upload unsigned release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: app/build/outputs/apk/release/*.apk
