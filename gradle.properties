org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.nonTransitiveRClass=true
kotlin.code.style=official

# WICHTIG: JDK 25 hat aktuell einen offenen Kotlin-Compiler-Bug (JetBrains
# KT-83610), der kspDebugKotlin mit "IllegalArgumentException: 25.0.x" zum
# Absturz bringt. Solange dieser Bug offen ist, läuft der Gradle-Daemon
# HIER auf JDK 21 statt 25 (org.gradle.java.home bestimmt die komplette
# Build-JVM, nicht nur einen Kompilier-Task). Pfad an deine Installation
# anpassen, z.B.: C:/Program Files/Eclipse Adoptium/jdk-21.0.x-hotspot
org.gradle.java.home=C:/Program Files/Eclipse Adoptium/jdk-21.0.11.10-hotspot
